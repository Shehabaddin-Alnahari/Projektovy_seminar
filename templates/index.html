<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Rezervační systém - Přehled</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">Dostupné místnosti</h1>
    
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Místnost</th>
                        <th>Budova (Patro)</th>
                        <th>Typ</th>
                        <th>Kapacita</th>
                        <th>Poznámka</th>
                        <th>Akce</th>
                    </tr>
                </thead>
                <tbody>
                    {% for room in rooms %}
                    <tr>
                        <td><strong>{{ room.room_number }}</strong></td>
                        <td>{{ room.building }} ({{ room.floor }}. patro)</td>
                        <td>{{ room.room_type }}</td>
                        <td>{{ room.capacity }} míst</td>
                        <td>{{ room.notes }}</td>
                        <td>
                            <button class="btn btn-primary btn-sm">Rezervovat</button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="6" class="text-center">V databázi nejsou žádné místnosti.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
